# grove.yml — this grove's identity and placement constants.
#
# Placement is a pure function of plantings.jsonl + these values (ADR-0007):
# CHANGING seed / plotPitch / clearingCapacity AFTER TREES ARE PLANTED MOVES
# EVERY TREE — the one betrayal this system is designed to prevent. Set them
# once, before the first planting, then treat them as soil: not yours to move.

name: "A new grove"            # shown at the grove's edge; pick something worth walking to
seed: "change-me-once"         # rotates the spirals so no two groves look alike — set before first planting

# placement constants (defaults match grove/place.mjs DEFAULTS — usually leave as-is)
plotPitch: 32                  # one plot per tree, identical for everyone ("equal soil")
clearingCapacity: 256          # every clearing reserves space for this many at creation

# the placement algorithm this grove is pinned to (semver-sacred; major = trees move)
placeVersion: "1.0.0"
