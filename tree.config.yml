# tree.config.yml — per-user config (this repo carries Walter's as the reference instance)
# See docs/03-data-model.md §3 for the classification priority chain this config drives.
# Note for future editors — the generator's YAML parser (generator/serialize.mjs) is a tiny
# hand-rolled one. Keep comment-only lines free of a bare colon (an inline comment trailing
# a real config value is fine and gets stripped; a comment-only LINE containing a colon is
# parsed as if it were a config entry, which is not what you want).
#
# Priority chain, first match wins
#   1. explicit repo mapping in the repos section below (highest priority)
#   2. GitHub topic fallback in the topic-map section, used when a repo isn't listed above
#   3. Obsidian tag mapping in vault.tag-map, notes only, phase 4
#   4. unclassified bucket for anything unmapped, rendered as faint gray shoots at the
#      trunk base. This is BY DESIGN — visible nagging to go add a mapping rather than a
#      repo's work silently vanishing. Seeing shoots there is a prompt to edit this file.
#
# This file is Walter's main editing surface for the pipeline. When a new repo shows up
# in the nightly harvest and lands in unclassified, add one line to repos (or, for a whole
# class of future repos, one line to topic-map) and it'll classify from then on.

owner: webmemo-code
seed: "webmemo-code"          # determinism anchor for the growth generator PRNG, do not change
                               # casually — changing it reshuffles every PRNG stream and every
                               # existing branch/leaf/root will look different on next build.
taxonomy: default-v1           # the CREATE/AUTOMATE/DISTRIBUTE/BUILD taxonomy (generator/taxonomy.mjs, 10 sectors)

# ----------------------------------------------------------------------------------------
# 1. explicit repo -> sector mapping (highest-priority classification rule)
# ----------------------------------------------------------------------------------------
# Only high-confidence mappings belong here. Everything else falls through to topic-map
# and then to unclassified — that's the intended default, not a gap to panic over.
repos:
  # BUILD / pro-code — hand-written software, this repo included (dogfooding, docs/04 §2)
  ai-learning-tree:                    build.pro-code
  ai-knowledge-base-visualizer:        build.pro-code
  github-intro-skill:                  build.pro-code
  claude-memory-template:              build.pro-code
  claude-code-global-config:           build.pro-code
  ai-skills-assessment-wordpress:      build.pro-code
  claude-flow:                         build.pro-code

  # DISTRIBUTE / seo — search + knowledge-graph tooling
  entity-map:                          distribute.seo
  google-knowledge-graph-retriever:    distribute.seo
  google-knowledge-graph-request:      distribute.seo

  # CREATE / copy — writing + publishing pipelines
  copywriting-style-guide:             create.copy
  markdown-wp-rm-post-publisher:       create.copy
  markdown-wp-wm-linkedin-article-publisher: create.copy
  wp-categories-enhancer:              create.copy
  wp-custom-sidebar:                   create.copy
  wp-rm-tm-translation:                create.copy
  schaerers-info:                      create.copy
  schaerers.info:                      create.copy

  # CREATE / images — photo & image asset pipelines
  photo-gallery:                       create.images
  texture-generator:                   create.images

  # CREATE / 3D — interactive visualizations
  ai-periodic-cube:                    create.3d
  vrml-converter-viewer:               create.3d
  cryptoprice360:                      create.3d

  # CREATE / video — programmatic video creation
  programmatic-video:                  create.video

  # AUTOMATE / workflows — cross-tool glue and content-ops automation
  flickr-to-instagram-automation:      automate.workflows
  api_asana_content_retriever:         automate.workflows
  lightroom-metadata-translator:       automate.workflows
  batch-rename-files-powershell-script: automate.workflows
  obsidian-ai:                         automate.workflows
  my-ai-learning-journey:              automate.workflows
  android-app-seerenbachfaelle:        automate.workflows

  # BUILD / no-code
  lovable:                             build.no-code
  bolt:                                build.no-code
  v0:                                  build.no-code

# ----------------------------------------------------------------------------------------
# 2. GitHub topic -> sector fallback, used when a repo isn't explicitly mapped above
# ----------------------------------------------------------------------------------------
# Add topics here as new repo kinds emerge — cheaper than listing every repo by name.
# The harvester checks repos first and falls back to topic-map before giving up to
# unclassified (docs/03 §3 priority chain, step 2).
topic-map:
  seo:      distribute.seo
  geo:      distribute.geo
  comfyui:  automate.workflows
  wordpress: create.copy
  3d: create.3d

# ----------------------------------------------------------------------------------------
# 3. harvest scope — what the nightly harvester is allowed to pull (docs/03 §6 privacy)
# ----------------------------------------------------------------------------------------
harvest:
  include-forks: false      # forked repos are noise, not your own work — excluded by default
  private-repos: true       # opt-in only; flip to true once HARVEST_TOKEN has private-repo
                            # scope and you've decided private commit history should grow
                            # public canopy (see docs/03-data-model.md §6 rule 4)

# ----------------------------------------------------------------------------------------
# 4. Obsidian vault harvesting (notes -> roots; content never leaves the vault)
# ----------------------------------------------------------------------------------------
# Phase 4 (Roots, docs/04 §1). The harvester (harvester/vault.mjs) reads the vault's own
# git history (it syncs via obsidian-git: https://github.com/Vinzent03/obsidian-git) as a
# LOCAL checkout — never over the network, never the note content itself. Only a path-hash,
# a timestamp, and tags already present in tag-map below ever reach data/growth-log.jsonl,
# and every emitted event is private: true, unconditionally (docs/03 §6, docs/decisions/0002).
#
# enabled: false by default — flip to true only once a local vault checkout (or the Actions
# checkout below) actually exists at `path`; the harvester exits cleanly either way, but
# leaving this off keeps a fresh clone from ever looking for a vault that isn't there yet.
vault:
  enabled: false
  # git URL the WORKFLOW checks the vault out from (actions/checkout `repository:`), e.g.
  # git@github.com:you/your-obsidian-vault.git or https://github.com/you/your-vault.git.
  # Requires a repo secret VAULT_TOKEN (a PAT with read access) — see harvester/README.md
  # "Vault harvesting" for setup. Leave blank to skip the vault checkout step entirely.
  repo: ""
  # local checkout path the harvester reads from — override per-run with `--vault <path>`.
  # In Actions this is the `path:` the vault gets checked out to (a sibling-style directory
  # inside the workspace); locally it defaults to a sibling of this repo.
  path: "../vault"
  # tag -> sector allow-list (docs/03 §3 step 3). ONLY tags listed here ever leave the
  # vault — an unmapped tag (#job-search, #medical-history, whatever) is never emitted,
  # even as a raw string; the note just falls into `unclassified` like an unmapped repo
  # does on the GitHub side. This is deliberate: a tag not on this list is still something
  # Walter never told the pipeline was safe to surface. See harvester/README.md.
  tag-map:
    "ai/copy":      create.copy
    "ai/images":    create.images
    "ai/video":     create.video
    "ai/3d":        create.3d
    "ai/workflows": automate.workflows
    "ai/seo":       distribute.seo
    "ai/geo":       distribute.geo
    "ai/no-code":   build.no-code
    "ai/low-code":  build.low-code
    "ai/pro-code":  build.pro-code

# ==========================================================================================
# 5. privacy — root-system visibility mode (phase 4 "Roots", docs/03 §6, ADR-0005)
# ==========================================================================================
# Appended block (kept at the END of the file so the phase-4 renderer work and the
# concurrent harvester/vault work never touch the same lines). Modes:
#   owner       full roots: sector-attributed glow + the rootDetail aggregate block.
#               This is Walter's own tree — the owner sees their own private knowledge.
#   silhouette  (default for OTHER users) roots keep their shape but carry no sector
#               attribution and ship no aggregates — an anonymized below-ground silhouette.
#   hidden      no root geometry at all.
# NOTE (docs/03 §6 rule 3): even `owner` never emits private event ids / path hashes /
# per-note rows — rootDetail is aggregates only, because tree.json can be embedded publicly.
# This committed reference config stays on the safe default; flip to `owner` (and rebuild
# with `node generator/build.mjs`) to see your own sector-attributed roots + note aggregates.
privacy:
  roots: silhouette
