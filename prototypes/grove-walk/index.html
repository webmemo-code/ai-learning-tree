<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI Learning Tree — grove walk 001</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #05070d; font-family: "Segoe UI", system-ui, sans-serif; }
  #err {
    position: fixed; inset: 0; display: none; place-items: center; z-index: 50;
    background: rgba(5, 7, 13, 0.92); color: #cfd8e3; text-align: center; padding: 24px;
  }
  #err.on { display: grid; }
  #err .box { max-width: 540px; }
  #err h2 { color: #ff9d9d; font-size: 18px; margin: 0 0 10px; }
  #err p { font-size: 13.5px; line-height: 1.6; color: #aab8c9; }
  #err code { background: rgba(120, 160, 230, 0.16); padding: 2px 6px; border-radius: 5px; color: #eaf2fb; }
</style>
</head>
<body>
<div id="err"><div class="box">
  <h2>Couldn't load the grove</h2>
  <p id="errMsg"></p>
  <p>Serve the repo root over http (<code>python -m http.server 8123</code>) and open
  <code>/prototypes/grove-walk/</code>. Pass <code>?grove=&lt;base-url&gt;</code> to walk a
  <b>real</b> grove (the base must serve <code>grove.yml</code> + <code>plantings.jsonl</code>,
  e.g. a repo's raw-content root); without it you get the built-in mock story.</p>
</div></div>

<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.181/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.181/examples/jsm/"
} }
</script>

<script type="module">
// Thin shell: the whole renderer lives in grove/walk-app.mjs (shared with the
// grove template's own walk page). This page only decides WHAT to walk:
//   ?grove=<base-url>  -> a real grove (its grove.yml + plantings.jsonl)
//   (no param)         -> the built-in mock story, incl. two REAL local trees
import { placeGrove, parsePlantings } from '../../grove/place.mjs';
import { loadGrove, startGroveWalk } from '../../grove/walk-app.mjs';

const PARAMS = new URLSearchParams(location.search);
try {
  let opts;
  if (PARAMS.get('grove')) {
    const { config, events } = await loadGrove(PARAMS.get('grove'), parsePlantings);
    opts = {
      config, events,
      subtitle: `${config.name || 'a grove'} · loaded live`,
      blurb: `A <b>real</b> grove: its planting log + <code>grove.yml</code> fetched from
        <code>?grove=</code>, placed by <code>grove/place.mjs</code>, impostors from each
        member's published <code>tree.json</code> where fetchable. <b>Drag</b> to look,
        <b>WASD</b> to walk, <b>wheel</b> to glide, click a tree to meet its grower.`,
      note: 'grove walk 001 · live planting log',
    };
  } else {
    // ---------- the mock story (same grove as grove-sketch, plus two REAL members) ----------
    const log = [];
    let n = 0;
    const plantMock = (clearing, count) => {
      for (let i = 0; i < count; i++) log.push({ kind: 'planted', tree: `member/tree-${++n}`, url: null, clearing, ts: '2026-08-01T00:00:00Z' });
    };
    log.push({ kind: 'planted', tree: 'webmemo-code/ai-learning-tree', url: '../../data/tree.json', clearing: 'commons', ts: '2026-07-14T00:00:00Z' });
    log.push({ kind: 'planted', tree: 'demo/mock-tree', url: '../../data/mock/tree.json', clearing: 'commons', ts: '2026-07-14T00:00:00Z' });
    plantMock('commons', 32);
    log.push({ kind: 'clearing', id: 'acme-guild', label: 'ACME growth guild' });
    plantMock('acme-guild', 21); plantMock('commons', 30);
    log.push({ kind: 'clearing', id: 'cohort-26', label: 'Cohort ’26' });
    plantMock('cohort-26', 48); plantMock('commons', 40);
    log.push({ kind: 'clearing', id: 'indies', label: 'Indie gardeners' });
    plantMock('indies', 9);
    log.push({ kind: 'felled', tree: 'member/tree-7' });
    log.push({ kind: 'transplanted', tree: 'member/tree-40', to: 'indies' });
    plantMock('commons', 20);
    opts = {
      config: { seed: 'mock-grove' },
      events: log,
      subtitle: 'grove walk 001 · phase 6 · a forest of impostors',
      blurb: `A mock grove placed by <code>grove/place.mjs</code>. Two trees are <b>real</b>
        (built from their published <code>tree.json</code> — bounds, leaf clusters, sector
        hues, blossoms); the rest are seeded impostors. <b>Drag</b> to look, <b>WASD /
        arrows</b> to walk, <b>wheel</b> to glide, click a tree to meet its grower.`,
      note: 'grove walk 001 · impostor LOD — visit a tree to see it in full',
      // the two local real members open their own full renderer, not GitHub
      visitLink: (t) => t.url && t.url.endsWith('data/mock/tree.json') ? '../mood-sketch/?data=mock'
        : t.url && t.url.endsWith('data/tree.json') ? '../mood-sketch/'
        : (/^[\w.-]+\/[\w.-]+$/.test(t.tree || '') && !t.tree.startsWith('member/') ? `https://github.com/${t.tree}` : null),
    };
  }
  window.__dbg = await startGroveWalk({ placeGrove, ...opts });
} catch (e) {
  document.getElementById('errMsg').textContent = String(e.message || e);
  document.getElementById('err').classList.add('on');
  throw e;
}
</script>
</body>
</html>
