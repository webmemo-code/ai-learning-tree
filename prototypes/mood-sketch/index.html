<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.181/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.181/examples/jsm/"

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

// ---------- deterministic PRNG (seeded — same seed, same tree, always) ----------
function mulberry32(a) {
  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
const rand = mulberry32(20260713);
const R = (lo, hi) => lo + rand() * (hi - lo);

// ---------- the four strata (Section levels × forest stratification) ----------
const STRATA = [
  { name: 'Forest floor', level: 'Novice',       y0: 0,  y1: 3.0,  tint: 0x5aa66a },
  { name: 'Understory',   level: 'Experimenter', y0: 3.0, y1: 7.0, tint: 0x4fd8c4 },
  { name: 'Canopy',       level: 'Practitioner', y0: 7.0, y1: 12.0, tint: 0xffcf6e },
  { name: 'Emergent',     level: 'Expert',       y0: 12.0, y1: 16.5, tint: 0xe8ecff },
];
const ceilingFor = lvl => STRATA[Math.max(0, Math.min(3, lvl - 1))].y1 - 0.35;
const STRATUM_BOUNDARIES = STRATA.slice(1).map(st => st.y0); // heights where a level-up blossom can sit

// ---------- sector compass (limb → sectors), mock "Walter-ish" profile ----------
// level: Section level reached (gates height) · act: lifetime activity 0..1 (mass)
// recent: share of recent work 0..1 (foliage freshness + fireflies) · roots: private note mass
const SECTORS = [
  { id: 'copy',      limb: 'CREATE',     az: 15,  hue: 0xffb454, level: 3, act: 0.62, recent: 0.45, roots: 0.5 },
  { id: 'images',    limb: 'CREATE',     az: 55,  hue: 0xff6ec7, level: 2, act: 0.48, recent: 0.30, roots: 0.35 },
  { id: 'video',     limb: 'CREATE',     az: 95,  hue: 0xff5d73, level: 1, act: 0.20, recent: 0.65, roots: 0.85 }, // big roots, tiny shoot: growth foreshadowed
  { id: 'workflows', limb: 'AUTOMATE',   az: 140, hue: 0x7ce65a, level: 2, act: 0.42, recent: 0.40, roots: 0.4 },
  { id: 'seo',       limb: 'DISTRIBUTE', az: 185, hue: 0x35d0ba, level: 3, act: 0.85, recent: 0.55, roots: 0.6 },
  { id: 'geo',       limb: 'DISTRIBUTE', az: 225, hue: 0x4aa8ff, level: 3, act: 0.70, recent: 0.90, roots: 0.7 },
  { id: 'no-code',   limb: 'BUILD',      az: 270, hue: 0xb59aff, level: 2, act: 0.30, recent: 0.20, roots: 0.3 },
  { id: 'low-code',  limb: 'BUILD',      az: 310, hue: 0x8f7bff, level: 2, act: 0.36, recent: 0.30, roots: 0.35 },
  { id: 'pro-code',  limb: 'BUILD',      az: 350, hue: 0x6a8dff, level: 4, act: 1.00, recent: 1.00, roots: 0.8 }, // the emergent hero limb
];
const deg = d => (d * Math.PI) / 180;
const secIndex = new Map(SECTORS.map((s, i) => [s.id, i])); // sector id → 0..8, the aSector value

// ---------- scene scaffold ----------
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x05070d);
scene.fog = new THREE.FogExp2(0x05070d, 0.017);

const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 300);
camera.position.set(19, 9.5, 19);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
// ?dpr=1 (or lower) tames cost on software-GL / low-power embeds
const dprCap = parseFloat(new URLSearchParams(location.search).get('dpr') || '2');
renderer.setPixelRatio(Math.min(devicePixelRatio, dprCap));
document.getElementById('app').appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 6.2, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.45;
controls.maxDistance = 72;
controls.minDistance = 6;
controls.maxPolarAngle = deg(96); // allow a peek at the roots

// bloom pipeline (parameters informed by ai-periodic-cube's bloomComposer)
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.9, 0.55, 0.6);
composer.addPass(bloom);
composer.addPass(new OutputPass());

// ---------- growth state (uGrow sweeps 0→1; every element knows when it was born) ----------
// Shared across the three shader materials (segments / leaves / fireflies) BY REFERENCE, so
// filter + stratum-band easing driven from one place. uFilterSector<0 → no filter (identical
// output to phase 1). uSectorDim[i]/uSharedDim ease toward targets each frame (no snapping).
const U = {
  uTime: { value: 0 }, uGrow: { value: 0 },
  uFilterSector: { value: -1 },                       // -1 = no sector filter engaged
  uSectorDim: { value: new Array(9).fill(1) },        // per-sector brightness, eased
  uSharedDim: { value: 1 },                           // trunk + roots (shared → dim to ~0.5)
  uBandY0: { value: -1e6 }, uBandY1: { value: -1e6 }, // stratum-hover band, sentinel = inactive
  uBandGain: { value: 0 },                            // eased 0→~0.6 while a stratum row is hovered
};

// ---------- branch skeleton via instanced tapered cylinders ----------
const segs = []; // { start:V3, dir:V3, len, r, born, dist(0 root→1 tip), hue }
const V3 = (...a) => new THREE.Vector3(...a);
const smoothstep = (a, b, x) => { const t = Math.min(1, Math.max(0, (x - a) / (b - a))); return t * t * (3 - 2 * t); };

let leafCount = 0;
const leafClusters = []; // { center:V3, radius, born, sector, density } — canopy blobs
const blossoms = [];     // { pos, born, hue }

function pushSeg(start, dir, len, r, born, dist, hue, sec = -1) {
  segs.push({ start: start.clone(), dir: dir.clone().normalize(), len, r, born, dist, hue, sec });
}

// ---- the trunk: ONE dominant vertical axis with a slow organic waver ----
// A single leader rising to the canopy stratum, tapering base→top; everything
// else forks off it, so the silhouette reads "trunk", never "burst".
const TRUNK_H = 8.4;
const TRUNK_STEPS = 15;
const TRUNK_BASE_R = 0.54, TRUNK_TOP_R = 0.135;
const trunkNodes = []; // { pos, dir, r, dist, born, frac }
{
  const leanAz = R(0, Math.PI * 2), lean = R(0.05, 0.09);
  const waver = R(0.03, 0.06);
  let p = V3(0, -0.35, 0), dir = V3(0, 1, 0);
  for (let i = 0; i < TRUNK_STEPS; i++) {
    const t = i / (TRUNK_STEPS - 1);
    const r = TRUNK_TOP_R + (TRUNK_BASE_R - TRUNK_TOP_R) * Math.pow(1 - t, 1.5); // thick near the ground
    const dist = 0.32 * t;
    const born = 0.15 * t; // trunk grows in first (0 → 0.15)
    trunkNodes.push({ pos: p.clone(), dir: dir.clone().normalize(), r, dist, born, frac: t });
    // target heading: mostly straight up, a gentle constant lean + a slow S-waver
    const bend = lean * t + waver * Math.sin(t * Math.PI * 1.7 + 0.6);
    const target = V3(Math.cos(leanAz) * bend, 1, Math.sin(leanAz) * bend).normalize();
    dir.lerp(target, 0.4).normalize(); // curvature memory — never snaps
    const len = (TRUNK_H / TRUNK_STEPS) * (0.9 + 0.2 * (1 - t));
    pushSeg(p, dir, len, r, born, dist, 0x8a7a68);
    p = p.clone().addScaledVector(dir, len);
  }
}
// sample the trunk at a height fraction, for limb attachment (position + parent radius)
function trunkAt(frac) {
  const f = Math.min(0.999, Math.max(0, frac));
  const x = f * (trunkNodes.length - 1);
  const i = Math.floor(x), k = x - i;
  const a = trunkNodes[i], b = trunkNodes[Math.min(trunkNodes.length - 1, i + 1)];
  return {
    pos: a.pos.clone().lerp(b.pos, k),
    dir: a.dir.clone().lerp(b.dir, k).normalize(),
    r: a.r + (b.r - a.r) * k,
    dist: a.dist + (b.dist - a.dist) * k,
    born: a.born + (b.born - a.born) * k,
  };
}

// ---- a limb / branch: smooth eased curve, gravity sag + phototropic tip-curl ----
// Curvature memory (dir.lerp toward a force-blended target) replaces raw jitter, so
// limbs arc like limbs. Children fan out in the OUTER half → twigs. Foliage clusters
// live only at branch tips → canopy blobs, not sparks along the whole ray.
function growBranch(p0, dir0, r0, opts) {
  const {
    steps, stepLen, az, azKeep, ceil, hue, born0, bornSpan,
    depth, dist0, dist1, sector, isMain, ctx, gravity, tropism, taper,
  } = opts;
  let p = p0.clone(), dir = dir0.clone().normalize(), r = r0;
  const secIdx = opts.sector ? secIndex.get(opts.sector.id) : -1; // -1 = trunk/roots (shared)
  for (let i = 0; i < steps; i++) {
    const t = steps > 1 ? i / (steps - 1) : 0;
    // build a target direction from smooth "forces", then ease toward it
    const target = dir.clone();
    // 1) azimuth keeping — steer the horizontal heading gently back to the sector azimuth
    const rXZ = Math.hypot(target.x, target.z) || 1e-4;
    const curAz = Math.atan2(target.z, target.x);
    const dAz = Math.atan2(Math.sin(az - curAz), Math.cos(az - curAz));
    const newAz = curAz + dAz * azKeep;
    target.x = Math.cos(newAz) * rXZ; target.z = Math.sin(newAz) * rXZ;
    // 2) gravity — the limb sags mid-span under its own weight
    target.y -= gravity * Math.sin(Math.min(1, t) * Math.PI);
    // 3) phototropism — the tip curls back up toward the light
    target.y += tropism * smoothstep(0.5, 1.0, t);
    // 4) stratum ceiling — flatten & spread beneath it instead of piercing it
    if (p.y + target.y * stepLen > ceil) {
      target.y = Math.min(target.y, (ceil - p.y) / stepLen);
      if (target.y < 0) target.y *= 0.3;
    }
    target.normalize();
    dir.lerp(target, 0.3).normalize(); // curvature memory → smooth arc

    const len = stepLen * (1 - 0.35 * t);
    const dist = dist0 + (dist1 - dist0) * t;
    const born = born0 + bornSpan * t;
    pushSeg(p, dir, len, r, born, dist, hue, secIdx);
    const pPrev = p.clone();
    p = p.clone().addScaledVector(dir, len);
    r *= taper;

    // record stratum-boundary crossings on the main axis, for blossom (level-up) markers
    if (isMain && ctx) {
      for (const b of STRATUM_BOUNDARIES) {
        if ((pPrev.y - b) * (p.y - b) <= 0 && Math.abs(pPrev.y - b) < 2.0) ctx.crossings.push({ y: b, pos: p.clone(), born });
      }
    }

    // children — secondary/tertiary branches concentrated in the OUTER half, fanning to twigs
    if (depth > 0 && t > 0.45 && rand() < 0.55) {
      const childArea = R(0.32, 0.5);              // da Vinci: child takes a share of the cross-section…
      const childR = r * Math.sqrt(childArea);
      r *= Math.sqrt(1 - childArea);               // …and the parent thins by the remainder at the fork
      const side = rand() < 0.5 ? 1 : -1;
      const spreadAz = az + side * R(0.35, 0.85);
      const up = R(0.2, 0.55);
      const fan = V3(Math.cos(spreadAz) * (1 - up), up + 0.2, Math.sin(spreadAz) * (1 - up)).normalize();
      const cDir = dir.clone().lerp(fan, 0.6).normalize();
      growBranch(p, cDir, childR, {
        ...opts,
        steps: Math.max(3, Math.round((steps - i) * 0.7)), stepLen: stepLen * 0.72,
        az: spreadAz, azKeep: azKeep * 0.55, born0: born, bornSpan: bornSpan * (1 - t) * 0.9,
        depth: depth - 1, dist0: dist, isMain: false, gravity: gravity * 1.1, tropism: tropism * 1.15,
      });
    }
  }
  // foliage clusters only at branch tips (twigs, secondary tips, and each limb tip) → crown blobs
  if (sector && (depth <= 1 || isMain)) {
    const cr = 0.4 + sector.act * 0.4 + (2 - depth) * 0.12;
    leafClusters.push({ center: p.clone(), radius: cr, born: born0 + bornSpan, sector, density: depth === 0 ? 1.0 : 1.4 });
  }
  return p;
}

// ---- 9 sector limbs fork OFF the trunk at staggered heights, each near its azimuth ----
const TOP_DEPTH = 2;
for (const s of SECTORS) {
  const az = deg(s.az);
  // higher Section level → attaches higher up the trunk (and reaches higher); jitter staggers siblings
  const lf = (s.level - 1) / 3;
  const attachFrac = Math.min(0.86, Math.max(0.14, 0.16 + lf * 0.55 + R(-0.05, 0.12)));
  const node = trunkAt(attachFrac);
  // leaves the trunk at a believable branch angle (~34°–56° from vertical); higher levels stand more upright
  const branchAngle = deg(62 - s.level * 6 + R(-6, 8));
  const horiz = V3(Math.cos(az), 0, Math.sin(az));
  const dir0 = horiz.clone().multiplyScalar(Math.sin(branchAngle)).add(V3(0, Math.cos(branchAngle), 0)).normalize();
  const start = node.pos.clone().addScaledVector(horiz, node.r * 0.8).add(V3(0, R(-0.05, 0.05), 0));
  // taper continuity: the limb is always thinner than the trunk at the fork
  const r0 = Math.min(node.r * 0.72, 0.1 + s.act * 0.14);
  // reach scales with activity & level (the level-4 limb becomes the emergent hero above the canopy)
  const reach = (3.2 + s.act * 3.2 + (s.level - 1) * 1.1) * (0.5 + 0.5 * (s.level / 4));
  const steps = Math.round(6 + s.act * 6 + s.level * 1.2);
  const born0 = 0.14 + attachFrac * 0.12 + R(0, 0.04); // limbs born after the trunk, staggered by height
  const ctx = { crossings: [] };
  growBranch(start, dir0, r0, {
    steps, stepLen: reach / steps, az, azKeep: 0.35, ceil: ceilingFor(s.level), hue: s.hue,
    born0, bornSpan: 0.9 - born0, depth: TOP_DEPTH, dist0: node.dist, dist1: 1.0,
    sector: s, isMain: true, ctx, gravity: 0.13, tropism: 0.17, taper: 0.9,
  });
  // blossoms mark each stratum boundary this sector crossed (the level-up moments)
  for (let lvl = 2; lvl <= s.level; lvl++) {
    const boundary = STRATA[lvl - 1].y0;
    const near = ctx.crossings.filter(c => Math.abs(c.y - boundary) < 0.01);
    const c = near.length ? near[(rand() * near.length) | 0] : null;
    // lvl is the Section level newly reached; STRATA[lvl-1] is the stratum this crossing enters
    if (c) blossoms.push({
      pos: c.pos.clone().add(V3(R(-0.15, 0.15), R(0, 0.25), R(-0.15, 0.15))),
      born: Math.min(0.95, c.born + 0.03), hue: s.hue,
      sec: secIndex.get(s.id), sectorId: s.id, stratum: STRATA[lvl - 1].name, levelLabel: STRATA[lvl - 1].level, lvl,
    });
  }
  // roots mirror the compass below ground — spread outward and DOWN like a root flare, dim
  const nRoots = 1 + Math.round(s.roots * 2);
  for (let k = 0; k < nRoots; k++) {
    const ra = az + R(-0.4, 0.4);
    const rd = V3(Math.cos(ra) * 0.85, -0.9, Math.sin(ra) * 0.85).normalize();
    const rStart = V3(Math.cos(az) * TRUNK_BASE_R * 0.6, -0.2, Math.sin(az) * TRUNK_BASE_R * 0.6);
    growBranch(rStart, rd, 0.06 + s.roots * 0.06, {
      steps: 4 + Math.round(s.roots * 4), stepLen: 0.5, az: ra, azKeep: 0.4, ceil: -0.05,
      hue: 0x36503f, born0: 0.03 + R(0, 0.25), bornSpan: 0.3, depth: 1, dist0: 0.12, dist1: 0.02,
      sector: null, isMain: false, ctx: null, gravity: 0.06, tropism: -0.04, taper: 0.86,
    });
  }
}

// build the instanced mesh for all segments
{
  const geo = new THREE.CylinderGeometry(0.62, 1, 1, 6, 1, true);
  geo.translate(0, 0.5, 0); // base at origin so growth scales upward from the base
  const n = segs.length;
  const mesh = new THREE.InstancedMesh(geo, null, n);
  const aColor = new Float32Array(n * 3), aBorn = new Float32Array(n), aDist = new Float32Array(n), aSector = new Float32Array(n);
  const m = new THREE.Matrix4(), q = new THREE.Quaternion(), up = V3(0, 1, 0), sc = V3();
  const bark = new THREE.Color(0x241d18), c = new THREE.Color();
  segs.forEach((s2, i) => {
    q.setFromUnitVectors(up, s2.dir);
    sc.set(s2.r, s2.len, s2.r);
    m.compose(s2.start, q, sc);
    mesh.setMatrixAt(i, m);
    c.set(s2.hue).lerp(bark, 1 - Math.min(1, s2.dist * 0.55 + 0.12)); // bark darkens toward the root
    aColor.set([c.r, c.g, c.b], i * 3);
    aBorn[i] = s2.born; aDist[i] = s2.dist; aSector[i] = s2.sec;
  });
  geo.setAttribute('aColor', new THREE.InstancedBufferAttribute(aColor, 3));
  geo.setAttribute('aBorn', new THREE.InstancedBufferAttribute(aBorn, 1));
  geo.setAttribute('aDist', new THREE.InstancedBufferAttribute(aDist, 1));
  geo.setAttribute('aSector', new THREE.InstancedBufferAttribute(aSector, 1));
  mesh.material = new THREE.ShaderMaterial({
    uniforms: U,
    vertexShader: /* glsl */`
      attribute vec3 aColor; attribute float aBorn, aDist, aSector;

// ---------- leaves: instanced billboards, hue = sector, freshness = recency ----------
{

    else if (s.recent < 0.25 && rand() < 0.5) c.lerp(gold, 0.6); // dormant sectors turn autumnal, never bare
    const boost = 0.9 + s.recent * 0.9;                          // recency feeds the bloom pass

{

// ---------- compass wedge highlight — a glowing arc under the selected sector's limb ----------
// Built in world XZ directly (azimuth = atan2(z,x), matching how limbs place themselves), so the
// glow always sits beneath the real bough regardless of the ground texture's UV orientation.
const wedge = new THREE.Mesh(new THREE.BufferGeometry(), new THREE.ShaderMaterial({
  transparent: true, depthWrite: false, side: THREE.DoubleSide, blending: THREE.AdditiveBlending,
  uniforms: { uColor: { value: new THREE.Color() }, uOpacity: { value: 0 } },
  vertexShader: /* glsl */`
    attribute float aA; varying float vA;
    void main() { vA = aA; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
  fragmentShader: /* glsl */`
    uniform vec3 uColor; uniform float uOpacity; varying float vA;
    void main() { gl_FragColor = vec4(uColor, uOpacity * vA); }`,

let wedgeTargetOpacity = 0;
function buildWedge(azCenter, half, rIn, rOut, steps) {
  // per-vertex alpha: full at the inner rim fading to nothing at the outer, with soft angular

  const g = new THREE.BufferGeometry();
  const pos = [], alp = [], idx = [];
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    const a = azCenter - half + (2 * half) * t;
    const edge = Math.pow(Math.sin(t * Math.PI), 0.6); // 0 at the angular edges, 1 mid-wedge
    alp.push(edge, 0);
    pos.push(Math.cos(a) * rIn, 0, Math.sin(a) * rIn);
    pos.push(Math.cos(a) * rOut, 0, Math.sin(a) * rOut);
  }
  for (let i = 0; i < steps; i++) {
    const b = i * 2; idx.push(b, b + 1, b + 2, b + 1, b + 3, b + 2);
  }
  g.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  g.setAttribute('aA', new THREE.Float32BufferAttribute(alp, 1));
  g.setIndex(idx);
  return g;
}
function updateWedge(idx) {
  if (idx < 0) { wedgeTargetOpacity = 0; return; }
  const s = SECTORS[idx];
  wedge.geometry.dispose();
  wedge.geometry = buildWedge(deg(s.az), deg(20), 4.6, 14.2, 32); // per-sector az ±20°
  wedge.material.uniforms.uColor.value.set(s.hue);
  wedge.visible = true;
  wedgeTargetOpacity = 0.5;
}

// ================= INTERACTION MODEL (phase 2) =================
// picking (drag-vs-click discriminated) · sector filter (dim-not-hide) · Sector Walk tour ·
// leaf/blossom detail panel · stratum-legend hover. All eased; idle output == phase 1.
const raycaster = new THREE.Raycaster();
const easeInOutCubic = t => (t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2);
const defaultCamPos = camera.position.clone();     // the load framing we return to
const defaultTarget = controls.target.clone();

// ---- sector filter state ----
let filterIndex = -1;                 // -1 = no filter
let autoRotatePrev = controls.autoRotate;
function applyFilter(idx) {           // idx: 0..8 sets, -1 clears (no toggle here — callers decide)
  if (idx === filterIndex) return;
  const wasFiltered = filterIndex >= 0;
  filterIndex = idx;
  updateWedge(idx);
  refreshLegendActive();
  if (idx >= 0) {
    U.uFilterSector.value = idx;                 // engage immediately; dims ease in
    if (!wasFiltered) autoRotatePrev = controls.autoRotate;
    tourToSector(idx);                           // Sector Walk
  } else {
    startTour(defaultCamPos.clone(), defaultTarget.clone(), 1.6, true); // return + restore autoRotate
  }
}

// ---- camera tour (ease-in-out, cancelled by any manual orbit) ----
let tour = null; // { t, dur, p0, p1, tg0, tg1, restoreAuto }
function startTour(p1, tg1, dur, restoreAuto) {
  tour = { t: 0, dur, p0: camera.position.clone(), p1, tg0: controls.target.clone(), tg1, restoreAuto: !!restoreAuto };
  controls.autoRotate = false; // never spin mid-flight
}
function cancelTour() { // hand control back to the user without a jump
  if (!tour) return;
  if (tour.restoreAuto) controls.autoRotate = autoRotatePrev;
  tour = null;
}
function tourToSector(idx) {
  const s = SECTORS[idx];
  const clusters = leafClusters.filter(c => c.sector === s);
  const centroid = new THREE.Vector3();
  if (clusters.length) { for (const c of clusters) centroid.add(c.center); centroid.multiplyScalar(1 / clusters.length); }
  else centroid.set(Math.cos(deg(s.az)) * 6, 6, Math.sin(deg(s.az)) * 6);
  const dir = V3(Math.cos(deg(s.az)), 0, Math.sin(deg(s.az)));
  const dist = 11 + s.act * 4 + s.level * 0.6;                       // frame the whole limb
  const camPos = centroid.clone().addScaledVector(dir, dist).add(V3(0, 2.6, 0));
  startTour(camPos, centroid.clone(), 1.6, false);
}

// ---- pick pipeline ----
const pointerNDC = (x, y, out) => out.set((x / innerWidth) * 2 - 1, -(y / innerHeight) * 2 + 1);
const _ndc = new THREE.Vector2(), _v = new THREE.Vector3();
function nearestLeafCluster(x, y, maxPx) {        // screen-space nearest (leaves aren't raycastable)
  let best = -1, bestD = maxPx * maxPx;
  for (let i = 0; i < leafClusters.length; i++) {
    _v.copy(leafClusters[i].center).project(camera);
    if (_v.z > 1) continue;                       // behind camera
    const sx = (_v.x * 0.5 + 0.5) * innerWidth, sy = (-_v.y * 0.5 + 0.5) * innerHeight;
    const d = (sx - x) * (sx - x) + (sy - y) * (sy - y);
    if (d < bestD) { bestD = d; best = i; }
  }
  return best;
}
function azToSector(az) {                          // az radians → nearest sector index
  let best = 0, bestD = 1e9;
  for (let i = 0; i < SECTORS.length; i++) {
    let d = Math.abs(((deg(SECTORS[i].az) - az + Math.PI * 3) % (Math.PI * 2)) - Math.PI);
    if (d < bestD) { bestD = d; best = i; }
  }

}
function doPick(x, y) {
  pointerNDC(x, y, _ndc);
  raycaster.setFromCamera(_ndc, camera);
  // 1) blossoms — raycast the little spheres directly (does NOT touch the filter)
  const bHit = raycaster.intersectObjects(blossomMeshes, false);
  if (bHit.length) { showBlossom(bHit[0].object); return 'blossom'; }
  // 2) leaves — nearest projected cluster within ~24px (also filter-neutral)
  const li = nearestLeafCluster(x, y, 24);
  if (li >= 0) { showLeaf(li); return 'leaf'; }
  // 3) ground compass wedge → toggle sector filter
  if (groundMesh) {
    const gHit = raycaster.intersectObject(groundMesh, false);
    if (gHit.length) {
      const p = gHit[0].point;
      const idx = azToSector(Math.atan2(p.z, p.x));
      applyFilter(idx === filterIndex ? -1 : idx);
      closePanel();
      return 'sector';
    }
  }
  // 4) empty space → clear everything
  applyFilter(-1); closePanel();
  return null;
}

// ---- detail panel (mock data, deterministic — never consumes the tree's PRNG) ----

const LEAF_TITLES = ['committed a draft', 'shipped an experiment', 'refined a prompt', 'published a note',
  'reviewed a workflow', 'tuned a pipeline', 'logged a finding', 'merged an improvement'];
const LEAF_TAGS = ['draft', 'shipped', 'evergreen', 'wip', 'insight', 'refactor', 'cloud', 'local'];

function showLeaf(i) {
  const cl = leafClusters[i], s = cl.sector;
  const pr = mulberry32(hashSeed(i, secIndex.get(s.id)));  // second, independent stream — geometry untouched
  const title = LEAF_TITLES[(pr() * LEAF_TITLES.length) | 0];
  const days = 1 + Math.floor(pr() * (s.recent > 0.5 ? 12 : 200)); // fresher sectors → more recent event
  const sha = (pr() * 0xfffffff | 0).toString(16).padStart(7, '0').slice(0, 7);
  const t1 = LEAF_TAGS[(pr() * LEAF_TAGS.length) | 0], t2 = LEAF_TAGS[(pr() * LEAF_TAGS.length) | 0];
  elTitle.textContent = `🍃 ${s.id}`;
  elBody.innerHTML =
    `<div class="meta">${title} · <b>${relDate(days)}</b></div>` +
    `<div class="meta">link: <a href="#" onclick="return false">github.com/webmemo-code/${s.limb.toLowerCase()}/commit/${sha}</a></div>` +
    `<div class="tags"><span class="tag">${t1}</span>${t2 !== t1 ? `<span class="tag">${t2}</span>` : ''}</div>`;
  elDetail.classList.add('on');
}
function showBlossom(mesh) {
  const u = mesh.userData;
  const pr = mulberry32(hashSeed(u.lvl, u.sec));
  const mo = String(1 + (pr() * 6 | 0)).padStart(2, '0'), da = String(1 + (pr() * 27 | 0)).padStart(2, '0'); // Jan–Jun: mock milestones stay in the past
  elTitle.textContent = `🌸 Level-up`;
  elBody.innerHTML =
    `<div class="meta"><b>${u.sectorId}</b> reached <b>${u.stratum}</b> · ${u.levelLabel}</div>` +
    `<div class="meta">Milestone: certification badge · 2026-${mo}-${da}</div>`;
  elDetail.classList.add('on');
}

// ---- pointer: drag-vs-click discriminator (click only if <5px AND <200ms) ----
const dom = renderer.domElement;
let downX = 0, downY = 0, downT = 0;
let downPrimary = false; // only the primary button picks — right/middle stay pure camera input
dom.addEventListener('pointerdown', e => { downPrimary = e.button === 0; downX = e.clientX; downY = e.clientY; downT = performance.now(); cancelTour(); });
dom.addEventListener('pointerup', e => {
  if (e.button !== 0 || !downPrimary) return;
  const moved = Math.hypot(e.clientX - downX, e.clientY - downY);
  if (moved <= 5 && performance.now() - downT <= 200) doPick(e.clientX, e.clientY); // a click, not an orbit drag
});
// hover affordance — pointer cursor over a pickable, throttled
let hoverT = 0;
dom.addEventListener('pointermove', e => {
  const now = performance.now();
  if (now - hoverT < 60) return; hoverT = now;
  pointerNDC(e.clientX, e.clientY, _ndc);
  raycaster.setFromCamera(_ndc, camera);
  const over = raycaster.intersectObjects(blossomMeshes, false).length > 0 || nearestLeafCluster(e.clientX, e.clientY, 24) >= 0;
  dom.style.cursor = over ? 'pointer' : '';
});

// ---- keyboard: Escape clears filter + closes panel ----
addEventListener('keydown', e => { if (e.key === 'Escape') { applyFilter(-1); closePanel(); } });

// ---- sector legend: 9 clickable chips with hue dots ----
const secGrid = document.getElementById('secGrid');
SECTORS.forEach((s, i) => {
  const el = document.createElement('span');
  el.className = 'sec'; el.dataset.sec = i;
  el.setAttribute('role', 'button'); el.tabIndex = 0; el.setAttribute('aria-pressed', 'false');
  el.innerHTML = `<span class="dot" style="color:#${new THREE.Color(s.hue).getHexString()};background:#${new THREE.Color(s.hue).getHexString()}"></span>${s.id}`;
  const toggle = () => applyFilter(i === filterIndex ? -1 : i);
  el.addEventListener('click', toggle);
  el.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(); } });
  secGrid.appendChild(el);
});
function refreshLegendActive() {
  [...secGrid.children].forEach((el, i) => {
    el.classList.toggle('active', i === filterIndex);
    el.setAttribute('aria-pressed', String(i === filterIndex));
  });
}

// ---- stratum legend hover: highlight a height band ----
let hoveredStratum = -1;
document.querySelectorAll('#hud .stratum').forEach(row => {
  const k = +row.dataset.stratum; // HUD lists strata top-down; data-stratum maps to the STRATA index
  row.addEventListener('mouseenter', () => { hoveredStratum = k; U.uBandY0.value = STRATA[k].y0; U.uBandY1.value = STRATA[k].y1; });
  row.addEventListener('mouseleave', () => { hoveredStratum = -1; });
});

// ---------- growth / replay (wall-clock driven — frame-rate independent) ----------
let growStart = performance.now(), growDur = 4500; // initial load: the 4.5s grow-in echo
document.getElementById('replay').addEventListener('click', () => {
  growStart = performance.now(); growDur = 22000; // the full 22s journey
});
const spinBtn = document.getElementById('spin');
spinBtn.addEventListener('click', () => {
  controls.autoRotate = !controls.autoRotate;
  spinBtn.textContent = controls.autoRotate ? '⏸ Orbit' : '▶ Orbit';
});

// ---------- loop ----------
const clock = new THREE.Clock();
function tick() {
  requestAnimationFrame(tick);
  const dt = Math.min(clock.getDelta(), 0.05);
  U.uTime.value += dt;
  U.uGrow.value = Math.min(1, (performance.now() - growStart) / growDur);

  // ---- ease interaction state toward targets (~0.4s settle, frame-rate independent) ----
  const k = 1 - Math.exp(-dt / 0.13);
  for (let i = 0; i < 9; i++) {
    const tgt = filterIndex < 0 ? 1 : (i === filterIndex ? 1 : 0.2);
    U.uSectorDim.value[i] += (tgt - U.uSectorDim.value[i]) * k;
  }
  U.uSharedDim.value += ((filterIndex < 0 ? 1 : 0.5) - U.uSharedDim.value) * k;
  // once a cleared filter has fully eased back to full, drop the uniform to -1 (keeps output byte-identical to idle)
  if (filterIndex < 0 && U.uFilterSector.value >= 0) {
    let mx = Math.abs(U.uSharedDim.value - 1);
    for (let i = 0; i < 9; i++) mx = Math.max(mx, Math.abs(U.uSectorDim.value[i] - 1));
    if (mx < 0.01) U.uFilterSector.value = -1;
  }
  U.uBandGain.value += ((hoveredStratum >= 0 ? 0.6 : 0) - U.uBandGain.value) * k;

  // wedge glow + stratum ring/label brighten (all eased)
  const wo = wedge.material.uniforms.uOpacity;
  wo.value += (wedgeTargetOpacity - wo.value) * k;
  if (wo.value < 0.01 && wedgeTargetOpacity === 0) wedge.visible = false;
  for (const rg of strataRings) {
    const near = hoveredStratum >= 0 && (Math.abs(rg.y - STRATA[hoveredStratum].y0) < 0.01 || Math.abs(rg.y - STRATA[hoveredStratum].y1) < 0.01);
    rg.mesh.material.opacity += ((near ? 0.10 : rg.mesh.material.userData.base) - rg.mesh.material.opacity) * k;
  }
  strataLabels.forEach((sp, i) => { sp.material.opacity += ((hoveredStratum === i ? 1.0 : 0.6) - sp.material.opacity) * k; });

  // blossoms: pop scale (unchanged) + eased dim (plain meshes → lerp material.color)
  for (const b of blossomMeshes) {
    const s = Math.max(0.0001, Math.min(1, (U.uGrow.value - b.userData.born) / 0.05));
    const pop = s * (1.7 - 0.7 * s);
    b.scale.setScalar(pop * (1 + 0.12 * Math.sin(U.uTime.value * 2.0 + b.position.y)));
    const dimT = filterIndex < 0 ? 1 : (b.userData.sec === filterIndex ? 1 : 0.2);
    b.userData.dim += (dimT - b.userData.dim) * k;
    const d = b.userData.dim;
    b.material.color.copy(b.userData.baseColor).lerp(b.userData.gray, (1 - d) * 0.7).multiplyScalar(0.2 + 0.8 * d);
  }

  // camera: run the tour, else hand off to OrbitControls
  if (tour) {
    tour.t += dt;
    const u = easeInOutCubic(Math.min(1, tour.t / tour.dur));
    camera.position.lerpVectors(tour.p0, tour.p1, u);
    controls.target.lerpVectors(tour.tg0, tour.tg1, u);
    camera.lookAt(controls.target);
    if (tour.t >= tour.dur) { const ra = tour.restoreAuto; tour = null; if (ra) controls.autoRotate = autoRotatePrev; }
  } else {
    controls.update();
  }
  composer.render();
}
tick();

// robust sizing: some hosts (embeds, side panes) lay out after module init and
// never fire window.resize — observe the body instead of trusting events
function syncSize() {
  const w = Math.max(1, innerWidth), h = Math.max(1, innerHeight);
  if (renderer.domElement.width === w * renderer.getPixelRatio() && renderer.domElement.height === h * renderer.getPixelRatio()) return;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  composer.setSize(w, h);
}
addEventListener('resize', syncSize);
new ResizeObserver(syncSize).observe(document.body);
syncSize();

window.__dbg = {
  U, camera, controls, segs: segs.length, leaves: leafCount, clusters: leafClusters.length, blossoms: blossoms.length, trunkH: TRUNK_H,
  // ---- phase-2 hooks for the Playwright verifier (in addition to real pointer events) ----
  setFilter: id => applyFilter(id == null ? -1 : (secIndex.has(id) ? secIndex.get(id) : -1)), // id string or null
  pickAt: (x, y) => doPick(x, y),                                                              // CSS px → runs the pick pipeline
  state: () => ({ filter: filterIndex < 0 ? null : SECTORS[filterIndex].id, panelVisible: panelVisible(), tourActive: !!tour }),
};
</script>
</body>
</html>
