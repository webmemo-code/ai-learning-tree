# data/milestones.yml — the real, hand-authored milestone log for Walter's tree.
#
# See docs/03-data-model.md §2 ("Milestones") for the full spec and the
# integrity rule: a sector's stratum ceiling only rises via a milestone here —
# activity alone can fill a stratum but never cross into the next one.
#
# The nightly harvester (harvester/harvest.mjs) reads this file on every run
# and merges each entry into data/growth-log.jsonl as a `kind: milestone`
# event (deduped by ts+sector+level, so it's safe to run repeatedly and safe
# to edit old entries' `note`/`evidence` text — only ts/sector/level identify
# an entry for dedup purposes; see data/README.md).
#
# This file starts empty on purpose — the real milestones are Walter's to
# author, not to invent. Uncomment the template below and fill it in when a
# sector genuinely levels up (see docs/03-data-model.md §2 for `level`
# meanings: 2=Experimenter, 3=Practitioner, 4=Expert).
#
# - ts: 2026-01-01           # date the milestone was reached (YYYY-MM-DD)
#   sector: build.pro-code   # limb.sector id from tree.config.yml's taxonomy
#   level: 2                 # stratum ceiling this raises the sector to
#   evidence: "https://example.com/proof"  # URL only — prose goes in `note`
#   note: "Short, factual description of what happened."

