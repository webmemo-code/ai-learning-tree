name: Nightly growth harvest
# docs/04-roadmap-and-process.md §2 "Automation (from phase 3)":
# runs the harvester, appends to data/growth-log.jsonl, rebuilds data/tree.json,
# and commits with the exact message "CHORE | Nightly growth harvest" — the
# tree's growth is literally visible in `git log`. Only commits when data/
# actually changed, so a quiet night leaves no empty commit behind.

on:
  schedule:
    # 03:17 UTC — off-peak, and deliberately not on a round number (avoids
    # herding onto the same minute as everyone else's :00 cron jobs).
    - cron: '17 3 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  # never let two harvests race each other's commits; a manual dispatch queues
  # behind a still-running nightly rather than cancelling it mid-commit.
  group: nightly-growth-harvest
  cancel-in-progress: false

jobs:
  harvest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run harvester (tree.config.yml + data/milestones.yml -> data/growth-log.jsonl)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # optional: a PAT with broader scope (e.g. private-repo read) than the
          # ambient GITHUB_TOKEN; safe to leave unset — harvester.mjs falls back
          # to GITHUB_TOKEN-only (public data) per docs/03-data-model.md §6.
          HARVEST_TOKEN: ${{ secrets.HARVEST_TOKEN }}
        run: node harvester/harvest.mjs

      # Phase 4 (Roots): the vault is a SEPARATE private repo, checked out only
      # when both a secret and the config opt-in are present — a quiet no-op
      # otherwise (a fork or a clone without VAULT_TOKEN must never fail this
      # workflow). GitHub Actions does not reliably support referencing
      # `secrets.*` directly in a step's `if:` condition, so the check happens
      # in a `run:` step instead (the secret is read via `env:`, never
      # interpolated into the condition itself) and the result — plus the
      # owner/repo slug parsed from tree.config.yml's `vault.repo` (accepts an
      # git@/https URL or an owner/repo slug) — is exposed as step outputs
      # that later `if:` conditions and inputs can safely reference.
      - name: Check vault harvesting availability
        id: vault_check
        env:
          VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
        run: |
          OUT=$(node --input-type=module -e "
            import { parseYaml } from './generator/serialize.mjs';
            import { readFileSync } from 'node:fs';
            const cfg = parseYaml(readFileSync('tree.config.yml', 'utf8'));
            const enabled = !!(cfg.vault && cfg.vault.enabled === true);
            const repoRaw = (cfg.vault && cfg.vault.repo) || '';
            const m = repoRaw.match(/([^\/:]+)\/([^\/]+?)(?:\.git)?\$/);
            console.log(enabled ? 'true' : 'false');
            console.log(m ? \`\${m[1]}/\${m[2]}\` : '');
          ")
          ENABLED=$(echo "$OUT" | sed -n '1p')
          REPO_SLUG=$(echo "$OUT" | sed -n '2p')
          if [ -n "$VAULT_TOKEN" ] && [ "$ENABLED" = "true" ] && [ -n "$REPO_SLUG" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "repo=$REPO_SLUG" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "vault harvesting skipped this run (needs the VAULT_TOKEN secret, tree.config.yml vault.enabled: true, and vault.repo set)"
          fi

      - name: Checkout vault
        if: steps.vault_check.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.vault_check.outputs.repo }}
          token: ${{ secrets.VAULT_TOKEN }}
          path: vault

      - name: Run vault harvester (vault git history -> data/growth-log.jsonl, roots only)
        if: steps.vault_check.outputs.run == 'true'
        run: node harvester/vault.mjs --vault vault

      - name: Build tree.json (deterministic generator)
        run: node generator/build.mjs

      - name: Determinism check (must never break, docs/04 §2)
        run: node generator/test-determinism.mjs

      - name: Commit and push if data/ changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data/; then
            echo "no growth tonight — data/ unchanged, nothing to commit"
            exit 0
          fi
          git add data/
          git commit -m "CHORE | Nightly growth harvest"
          git push
